name: Sync Files from Another Repo
on:
  schedule:
    - cron: '50 * * * *'  # 每天執行一次
  workflow_dispatch:  # 也可以手動觸發
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.token }}
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: fangnina666/stock_legal_info
          path: stock_legal_info
          token: ${{ secrets.token }}
          submodules: false
          persist-credentials: false
          
      - name: Checkout source repo2
        uses: actions/checkout@v4
        with:
          repository: fangnina666/stock_wave_score
          path: stock_wave_score
          token: ${{ secrets.token }}
          submodules: false
          persist-credentials: false
      - name: Copy result MD files only
        run: |
          mkdir -p ./reports_his # 建立目標資料夾
          # 只複製 result 開頭的 .md 檔案
          mkdir -p ./reports_his
          # ✅ 把所有 result*.md 列出「mtime + path」，排序後只保留每個 basename 最新的一份，再複製
          sync_latest() {
            ROOT="$1"
            if [ ! -d "$ROOT" ]; then
              echo "skip (not found): $ROOT"
              return
            fi
          
            find "$ROOT" -type f -name "result*.md" -printf "%T@ %p\n" \
              | sort -nr \
              | awk '{
                  path=$2
                  n=split(path,a,"/")
                  base=a[n]
                  if(!seen[base]++){
                    print path
                  }
                }' \
              | while read -r f; do
                  echo "copy: $f"
                  cp -f "$f" ./reports_his/
                done
          }
          
          # 來源兩個 repo：reports_his（你現在截圖就是這裡）
          sync_latest stock_legal_info/reports_his
          sync_latest stock_wave_score/reports_his
          
          rm -rf stock_legal_info
          rm -rf stock_wave_score
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports_his/
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync result MD files from stock_legal_info at $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          fi
